<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ERROR 404 — TARGET NOT FOUND</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: #000; color: #33ff33;
    font-family: "Consolas", "Courier New", "Lucida Console", monospace;
    overscroll-behavior: none;
  }
  body { padding: 16px; }
  #crt {
    width: 100%; max-width: 760px;
    margin: 0 auto;
    background: #001500;
    border: 2px solid #33ff33;
    border-radius: 14px;
    box-shadow: 0 0 50px #33ff3555, inset 0 0 80px #00aa0022;
    padding: 14px 20px 14px;
    position: relative;
    text-shadow: 0 0 3px #33ff3399;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #crt::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.18) 3px
    );
    z-index: 5;
  }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .backlink {
    color: #1a8a1a;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-decoration: none;
    transition: color .15s, text-shadow .15s;
    text-shadow: 0 0 3px #33ff3355;
  }
  .backlink:hover { color: #aaffaa; }
  .topbar .tag { color: #1a8a1a; font-size: 11px; letter-spacing: 0.18em; }
  .hud {
    display: flex; justify-content: space-between; gap: 12px;
    font-size: 13px; padding: 4px 2px 8px;
    border-top: 1px dashed #33ff3555;
    border-bottom: 1px dashed #33ff3555;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .hud .label { color: #1a8a1a; margin-right: 4px; }
  .hud .val   { color: #aaffaa; }
  .hud .err   { color: #ff5555; letter-spacing: 0.2em; }
  #stage {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 3;
    background: #000a00;
    border: 1px solid #1a8a1a;
    border-radius: 6px;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #game { display: block; width: 100%; height: 100%; touch-action: none; }
  #overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #aaffaa; text-align: center; padding: 16px;
    pointer-events: none;
    z-index: 4;
  }
  #overlay .box {
    background: rgba(0, 21, 0, 0.85);
    border: 1px solid #33ff3388;
    border-radius: 8px;
    padding: 18px 22px;
    max-width: 90%;
  }
  #overlay h1 {
    font-size: 28px; margin: 0 0 8px;
    color: #ff5555; letter-spacing: 0.25em;
  }
  #overlay h2 {
    font-size: 18px; margin: 0 0 10px;
    color: #aaffaa;
  }
  #overlay p { margin: 6px 0; font-size: 13px; line-height: 1.5; color: #88dd88; }
  #overlay .key {
    display: inline-block; border: 1px solid #33ff33;
    padding: 1px 6px; border-radius: 3px; margin: 0 2px;
    color: #aaffaa; font-size: 12px;
  }
  .btnbar {
    display: flex; gap: 8px; margin-top: 10px;
    justify-content: center; flex-wrap: wrap;
  }
  .btnbar button {
    background: #002a00; color: #aaffaa;
    border: 1px solid #33ff33; border-radius: 6px;
    font-family: inherit; font-size: 14px; font-weight: bold;
    padding: 12px 16px; min-width: 64px;
    cursor: pointer; text-shadow: inherit;
    touch-action: manipulation; user-select: none;
  }
  .btnbar button:active { background: #066b06; }
  .btnbar button.fire { border-color: #66ddff; color: #aaeeff; flex: 1; max-width: 200px; }
  .footer {
    margin-top: 8px; text-align: center;
    color: #1a8a1a; font-size: 11px; letter-spacing: 0.15em;
  }
  @media (max-width: 600px) {
    body { padding: 8px; }
    #crt { padding: 10px 12px 10px; border-radius: 10px; }
    .hud { font-size: 12px; }
    #overlay h1 { font-size: 22px; }
    #overlay h2 { font-size: 15px; }
    #overlay p { font-size: 12px; }
    .btnbar button { padding: 14px 14px; font-size: 13px; }
    .backlink, .topbar .tag { font-size: 10px; }
  }
</style>
</head>
<body>
<div id="crt">
  <div class="topbar">
    <a href="/" target="_top" class="backlink">← BACK TO MAIN SYSTEM</a>
    <span class="tag">// 404.SYS</span>
  </div>
  <div class="hud">
    <span><span class="label">SYS:</span><span class="err">ERR 404</span></span>
    <span><span class="label">SCORE</span><span id="score" class="val">0</span></span>
    <span><span class="label">HIGH</span><span id="high" class="val">0</span></span>
    <span><span class="label">LIVES</span><span id="lives" class="val">3</span></span>
    <span><span class="label">WAVE</span><span id="wave" class="val">1</span></span>
    <span id="powerlbl" style="display:none"><span class="label">PWR</span><span id="power" class="val"></span></span>
  </div>
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="overlay"><div class="box" id="overlayBox"></div></div>
  </div>
  <div class="btnbar">
    <button id="bL">◀</button>
    <button id="bF" class="fire">FIRE</button>
    <button id="bR">▶</button>
  </div>
  <div class="footer">// PAGE NOT FOUND — DEFEND THE BUFFER</div>
</div>

<script>
"use strict";

// ---------- CONFIG ----------
const W = 720, H = 540;
const SHIP_SPEED = 380;
const BULLET_SPEED = 620;
const FIRE_COOLDOWN = 0.22;
const RAPID_COOLDOWN = 0.10;

// ---------- DOM ----------
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const overlayBox = document.getElementById("overlayBox");
const elScore = document.getElementById("score");
const elHigh  = document.getElementById("high");
const elLives = document.getElementById("lives");
const elWave  = document.getElementById("wave");
const elPower = document.getElementById("power");
const elPowerLbl = document.getElementById("powerlbl");

function resizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const rect = canvas.getBoundingClientRect();
  if (rect.width < 4 || rect.height < 4) return;
  canvas.width  = Math.round(rect.width  * dpr);
  canvas.height = Math.round(rect.height * dpr);
  ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
}
new ResizeObserver(resizeCanvas).observe(canvas);
window.addEventListener("orientationchange", () => setTimeout(resizeCanvas, 250));
window.addEventListener("resize", resizeCanvas);
// Some mobile browsers settle layout late; retry a few times
[50, 200, 600].forEach((t) => setTimeout(resizeCanvas, t));

// ---------- STATE ----------
let state = "title";
let ship, bullets, enemies, particles, powerups, stars;
let score, lives, wave, waveTimer, spawnTimer, spawnEvery;
let highScore = parseInt(localStorage.getItem("p404_high") || "0", 10);
let keys = { left:false, right:false, fire:false };
let lastTime = 0;

function reset() {
  ship = {
    x: W/2, y: H - 50, w: 28, h: 22,
    cooldown: 0, iframes: 0,
    shield: 0, triple: 0, rapid: 0
  };
  bullets = []; enemies = []; particles = []; powerups = [];
  stars = makeStars(70);
  score = 0; lives = 3; wave = 1;
  waveTimer = 0; spawnTimer = 0;
  spawnEvery = 1.4;
  updateHUD();
}

function makeStars(n) {
  const s = [];
  for (let i = 0; i < n; i++) {
    s.push({ x: Math.random()*W, y: Math.random()*H, v: 20 + Math.random()*60, z: Math.random() });
  }
  return s;
}

function updateHUD() {
  elScore.textContent = score;
  elHigh.textContent  = highScore;
  elLives.textContent = lives;
  elWave.textContent  = wave;
  const tags = [];
  if (ship && ship.shield > 0) tags.push("SHLD");
  if (ship && ship.triple > 0) tags.push("TRPL " + ship.triple.toFixed(0));
  if (ship && ship.rapid > 0)  tags.push("RAPD " + ship.rapid.toFixed(0));
  if (tags.length) {
    elPowerLbl.style.display = "";
    elPower.textContent = tags.join(" ");
  } else {
    elPowerLbl.style.display = "none";
  }
}

// ---------- INPUT ----------
window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = true;
  else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = true;
  else if (e.key === " " || e.key === "Spacebar") {
    keys.fire = true;
    if (state !== "play") startGame();
    e.preventDefault();
  } else if (e.key === "Enter") {
    if (state !== "play") startGame();
  }
});
window.addEventListener("keyup", (e) => {
  if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = false;
  else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = false;
  else if (e.key === " " || e.key === "Spacebar") keys.fire = false;
});

function bindHold(btn, k) {
  const on = (e) => {
    e.preventDefault();
    try { btn.setPointerCapture(e.pointerId); } catch (_) {}
    keys[k] = true;
    if (state !== "play") startGame();
  };
  const off = (e) => {
    e.preventDefault();
    try { btn.releasePointerCapture(e.pointerId); } catch (_) {}
    keys[k] = false;
  };
  btn.addEventListener("pointerdown",  on);
  btn.addEventListener("pointerup",    off);
  btn.addEventListener("pointercancel", off);
  btn.addEventListener("pointerleave",  off);
  // Block contextmenu / selection on long-press
  btn.addEventListener("contextmenu", (e) => e.preventDefault());
}
bindHold(document.getElementById("bL"), "left");
bindHold(document.getElementById("bR"), "right");
bindHold(document.getElementById("bF"), "fire");

// Tap the stage on title / game-over to start
document.getElementById("stage").addEventListener("pointerdown", (e) => {
  if (state !== "play") { e.preventDefault(); startGame(); }
});

// ---------- GAME LOOP ----------
function startGame() {
  reset();
  state = "play";
  overlay.style.display = "none";
}

function gameOver() {
  state = "over";
  if (score > highScore) {
    highScore = score;
    localStorage.setItem("p404_high", String(highScore));
  }
  updateHUD();
  showOverlay(`
    <h1>ERROR 404</h1>
    <h2>BUFFER OVERRUN</h2>
    <p>Score <span class="key">${score}</span> &nbsp; High <span class="key">${highScore}</span></p>
    <p>Press <span class="key">SPACE</span> / <span class="key">FIRE</span> to retry</p>
  `);
}

function showOverlay(html) {
  overlayBox.innerHTML = html;
  overlay.style.display = "flex";
}

function showTitle() {
  showOverlay(`
    <h1>ERROR 404</h1>
    <h2>TARGET NOT FOUND</h2>
    <p>Move <span class="key">◀</span> <span class="key">▶</span> &nbsp; Fire <span class="key">SPACE</span></p>
    <p>collect <span class="key">T</span> triple &nbsp; <span class="key">S</span> shield &nbsp; <span class="key">R</span> rapid &nbsp; <span class="key">+</span> life</p>
    <p>Press <span class="key">SPACE</span> / <span class="key">FIRE</span> to begin</p>
  `);
}

// ---------- SPAWNING ----------
function spawnEnemy() {
  const r = Math.random();
  let t;
  if (wave < 2)      t = r < 0.75 ? "asteroid" : "comet";
  else if (wave < 4) t = r < 0.55 ? "asteroid" : (r < 0.85 ? "comet" : "satellite");
  else               t = r < 0.40 ? "asteroid" : (r < 0.65 ? "comet" : (r < 0.85 ? "satellite" : "drone"));

  const e = { type: t, x: 30 + Math.random()*(W-60), y: -30, vx: 0, vy: 0, hp: 1, r: 16 };
  if (t === "asteroid") {
    e.r = 18 + Math.random()*14;
    e.hp = e.r > 25 ? 3 : 2;
    e.vy = 60 + wave*8 + Math.random()*40;
    e.vx = (Math.random()-0.5) * 30;
    e.spin = (Math.random()-0.5) * 1.4;
    e.angle = 0;
    e.shape = makeAsteroidShape(e.r);
    e.points = e.hp * 30;
  } else if (t === "comet") {
    e.r = 8;
    e.hp = 1;
    e.vy = 200 + wave*12 + Math.random()*80;
    e.vx = (Math.random()-0.5) * 60;
    e.points = 100;
    e.tail = [];
  } else if (t === "satellite") {
    e.r = 16;
    e.hp = 4;
    e.vy = 50 + wave*5;
    e.vx = (Math.random() < 0.5 ? -1 : 1) * (40 + Math.random()*30);
    e.points = 200;
    e.dropPower = true;
  } else if (t === "drone") {
    e.r = 12;
    e.hp = 1;
    e.vy = 90 + wave*6;
    e.vx = 0;
    e.zigPhase = Math.random() * Math.PI * 2;
    e.zigAmp = 80 + Math.random()*60;
    e.baseX = e.x;
    e.points = 150;
  }
  enemies.push(e);
}

function makeAsteroidShape(r) {
  const n = 9 + Math.floor(Math.random()*4);
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2;
    const rr = r * (0.75 + Math.random()*0.5);
    pts.push([Math.cos(a)*rr, Math.sin(a)*rr]);
  }
  return pts;
}

function spawnPowerup(x, y) {
  const types = ["T", "S", "R", "+"];
  const t = types[Math.floor(Math.random()*types.length)];
  powerups.push({ x, y, vy: 80, type: t, t: 0 });
}

// ---------- COLLISIONS ----------
function hit(a, b, pad = 0) {
  const dx = a.x - b.x, dy = a.y - b.y;
  const r = (a.r || 6) + (b.r || 6) + pad;
  return dx*dx + dy*dy < r*r;
}

// ---------- UPDATE ----------
function update(dt) {
  let dx = 0;
  if (keys.left)  dx -= 1;
  if (keys.right) dx += 1;
  ship.x += dx * SHIP_SPEED * dt;
  ship.x = Math.max(20, Math.min(W - 20, ship.x));

  ship.cooldown -= dt;
  if (ship.iframes > 0) ship.iframes -= dt;
  if (ship.triple > 0) ship.triple = Math.max(0, ship.triple - dt);
  if (ship.rapid  > 0) ship.rapid  = Math.max(0, ship.rapid  - dt);

  if (keys.fire && ship.cooldown <= 0) {
    fire();
    ship.cooldown = ship.rapid > 0 ? RAPID_COOLDOWN : FIRE_COOLDOWN;
  }

  for (const b of bullets) {
    b.y += b.vy * dt;
    if (b.vx) b.x += b.vx * dt;
  }
  bullets = bullets.filter(b => b.y > -10 && b.x > -10 && b.x < W+10);

  for (const e of enemies) {
    e.x += e.vx * dt;
    e.y += e.vy * dt;
    if (e.type === "asteroid") {
      e.angle += e.spin * dt;
      if (e.x < e.r || e.x > W - e.r) e.vx *= -1;
    } else if (e.type === "satellite") {
      if (e.x < e.r || e.x > W - e.r) e.vx *= -1;
    } else if (e.type === "drone") {
      e.zigPhase += dt * 3;
      e.x = e.baseX + Math.sin(e.zigPhase) * e.zigAmp;
    } else if (e.type === "comet") {
      e.tail.push({ x: e.x, y: e.y });
      if (e.tail.length > 10) e.tail.shift();
    }
  }

  for (const b of bullets) {
    for (const e of enemies) {
      if (e.dead) continue;
      if (hit(b, e)) {
        e.hp--;
        b.dead = true;
        spark(b.x, b.y, "#aaffaa", 5);
        if (e.hp <= 0) {
          e.dead = true;
          score += e.points;
          spark(e.x, e.y, e.type === "comet" ? "#ffcc33" : "#aaffaa", 14);
          if (e.type === "satellite" && e.dropPower) spawnPowerup(e.x, e.y);
          else if (Math.random() < 0.05) spawnPowerup(e.x, e.y);
        }
        break;
      }
    }
  }
  bullets = bullets.filter(b => !b.dead);

  for (const e of enemies) {
    if (e.dead) continue;
    if (e.y > H + 40) {
      e.dead = true;
      score = Math.max(0, score - 10);
      continue;
    }
    if (ship.iframes > 0) continue;
    if (hit(ship, e, -2)) {
      if (ship.shield > 0) {
        ship.shield = 0;
        e.dead = true;
        spark(e.x, e.y, "#66ddff", 18);
        ship.iframes = 0.5;
      } else {
        e.dead = true;
        spark(ship.x, ship.y, "#ff5555", 22);
        ship.iframes = 1.2;
        lives--;
        if (lives <= 0) { updateHUD(); gameOver(); return; }
      }
    }
  }
  enemies = enemies.filter(e => !e.dead);

  for (const p of powerups) {
    p.y += p.vy * dt;
    p.t += dt;
    if (hit(ship, { x: p.x, y: p.y, r: 14 })) {
      applyPower(p.type);
      p.dead = true;
    }
  }
  powerups = powerups.filter(p => !p.dead && p.y < H + 20);

  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);

  for (const s of stars) {
    s.y += s.v * dt;
    if (s.y > H) { s.y = -2; s.x = Math.random()*W; }
  }

  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnEnemy();
    spawnTimer = spawnEvery * (0.7 + Math.random()*0.6);
  }
  waveTimer += dt;
  if (waveTimer > 18) {
    wave++;
    waveTimer = 0;
    spawnEvery = Math.max(0.45, spawnEvery * 0.9);
    flashWave();
  }

  updateHUD();
}

function fire() {
  const triple = ship.triple > 0;
  const baseY = ship.y - 14;
  if (triple) {
    bullets.push({ x: ship.x,    y: baseY, vy: -BULLET_SPEED, vx: 0,   r: 4 });
    bullets.push({ x: ship.x-10, y: baseY+4, vy: -BULLET_SPEED, vx: -60, r: 4 });
    bullets.push({ x: ship.x+10, y: baseY+4, vy: -BULLET_SPEED, vx: 60,  r: 4 });
  } else {
    bullets.push({ x: ship.x, y: baseY, vy: -BULLET_SPEED, vx: 0, r: 4 });
  }
}

function applyPower(t) {
  if (t === "T") ship.triple = 8;
  else if (t === "S") ship.shield = 1;
  else if (t === "R") ship.rapid = 8;
  else if (t === "+") lives = Math.min(9, lives + 1);
  spark(ship.x, ship.y, "#66ddff", 12);
}

function spark(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = 60 + Math.random()*120;
    particles.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v, life: 0.4 + Math.random()*0.3, color });
  }
}

let waveBanner = 0;
function flashWave() { waveBanner = 1.5; }

// ---------- RENDER ----------
function render() {
  ctx.clearRect(0, 0, W, H);

  ctx.strokeStyle = "#0a3a0a";
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let gx = 0; gx <= W; gx += 60) { ctx.moveTo(gx, 0); ctx.lineTo(gx, H); }
  for (let gy = 0; gy <= H; gy += 60) { ctx.moveTo(0, gy); ctx.lineTo(W, gy); }
  ctx.stroke();

  for (const s of stars) {
    ctx.fillStyle = s.z > 0.6 ? "#33ff33" : (s.z > 0.3 ? "#1a8a1a" : "#0c4a0c");
    ctx.fillRect(s.x, s.y, s.z > 0.6 ? 2 : 1, s.z > 0.6 ? 2 : 1);
  }

  for (const p of powerups) {
    const wob = Math.sin(p.t * 5) * 2;
    drawPowerup(p.x, p.y + wob, p.type);
  }

  for (const e of enemies) drawEnemy(e);

  ctx.fillStyle = "#aaffaa";
  for (const b of bullets) ctx.fillRect(b.x - 1.5, b.y - 6, 3, 10);

  drawShip();

  for (const p of particles) {
    const alpha = Math.max(0, p.life / 0.6);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 1, p.y - 1, 2, 2);
  }
  ctx.globalAlpha = 1;

  if (waveBanner > 0) {
    ctx.globalAlpha = Math.min(1, waveBanner);
    ctx.fillStyle = "#aaffaa";
    ctx.font = "bold 22px Consolas, monospace";
    ctx.textAlign = "center";
    ctx.fillText("WAVE " + wave, W/2, H/2);
    ctx.globalAlpha = 1;
  }
}

function drawShip() {
  if (ship.iframes > 0 && Math.floor(ship.iframes * 12) % 2 === 0) return;
  ctx.strokeStyle = "#aaffaa";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(ship.x,        ship.y - 14);
  ctx.lineTo(ship.x - 14,   ship.y + 10);
  ctx.lineTo(ship.x - 6,    ship.y + 6);
  ctx.lineTo(ship.x + 6,    ship.y + 6);
  ctx.lineTo(ship.x + 14,   ship.y + 10);
  ctx.closePath();
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(ship.x - 4, ship.y - 2);
  ctx.lineTo(ship.x + 4, ship.y - 2);
  ctx.stroke();
  if (ship.shield > 0) {
    ctx.strokeStyle = "#66ddff";
    ctx.beginPath();
    ctx.arc(ship.x, ship.y, 22, 0, Math.PI*2);
    ctx.stroke();
  }
}

function drawEnemy(e) {
  if (e.type === "asteroid") {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(e.angle);
    ctx.strokeStyle = e.hp >= 3 ? "#aaffaa" : "#33ff33";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const pts = e.shape;
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  } else if (e.type === "comet") {
    for (let i = 0; i < e.tail.length; i++) {
      const t = e.tail[i];
      ctx.globalAlpha = i / e.tail.length * 0.8;
      ctx.fillStyle = "#ffcc33";
      ctx.fillRect(t.x - 1, t.y - 1, 2, 2);
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = "#ffcc33";
    ctx.beginPath();
    ctx.arc(e.x, e.y, 5, 0, Math.PI*2);
    ctx.fill();
  } else if (e.type === "satellite") {
    ctx.strokeStyle = "#aaffaa";
    ctx.lineWidth = 1.5;
    ctx.strokeRect(e.x - 10, e.y - 7, 20, 14);
    ctx.beginPath();
    ctx.moveTo(e.x - 10, e.y); ctx.lineTo(e.x - 22, e.y);
    ctx.moveTo(e.x + 10, e.y); ctx.lineTo(e.x + 22, e.y);
    ctx.stroke();
    ctx.strokeRect(e.x - 28, e.y - 5, 6, 10);
    ctx.strokeRect(e.x + 22, e.y - 5, 6, 10);
    ctx.beginPath();
    ctx.moveTo(e.x, e.y - 7);
    ctx.lineTo(e.x, e.y - 14);
    ctx.stroke();
  } else if (e.type === "drone") {
    ctx.strokeStyle = "#66ddff";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(e.x, e.y - 8);
    ctx.lineTo(e.x - 10, e.y + 6);
    ctx.lineTo(e.x + 10, e.y + 6);
    ctx.closePath();
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(e.x, e.y - 1, 3, 0, Math.PI*2);
    ctx.stroke();
  }
}

function drawPowerup(x, y, t) {
  const colors = { T: "#66ddff", S: "#ffcc33", R: "#aaffaa", "+": "#aaffaa" };
  ctx.strokeStyle = colors[t] || "#aaffaa";
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x - 10, y - 10, 20, 20);
  ctx.fillStyle = colors[t] || "#aaffaa";
  ctx.font = "bold 14px Consolas, monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(t, x, y + 1);
}

// ---------- LOOP ----------
function loop(t) {
  const now = t / 1000;
  let dt = lastTime ? Math.min(0.05, now - lastTime) : 0;
  lastTime = now;

  if (state === "play") {
    update(dt);
    if (waveBanner > 0) waveBanner -= dt;
  }
  render();
  requestAnimationFrame(loop);
}

// ---------- BOOT ----------
resizeCanvas();
reset();
showTitle();
requestAnimationFrame(loop);
</script>
